<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">🧪 Lab Technician</span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 id="welcome"></h3>
        <div class="alert alert-success" id="orders">Loading pending orders...</div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function load() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            try {
                const me = await api.get('/auth/me');
                document.getElementById('welcome').textContent = `Welcome, ${me.user.full_name}`;
                const orders = await api.get('/laboratory/orders?status=ordered');
                if (orders.orders.length === 0) {
                    document.getElementById('orders').textContent = 'No pending orders.';
                } else {
                    document.getElementById('orders').innerHTML = orders.orders.map(o =>
                        `<div>Order #${o.id} - Patient ${o.patient_id} - Test: ${o.test_code}</div>`
                    ).join('');
                }
            } catch (e) {
                alert('Session expired');
                window.location.href = '/static/pages/login.html';
            }
        }
        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        load();
    </script>
</body>
</html>
