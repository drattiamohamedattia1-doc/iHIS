<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pharmacy Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-custom { background: linear-gradient(135deg, #198754, #20c997); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom p-2">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-prescription-bottle-alt"></i> iHIS Pharmacy</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-7">
                <div class="card p-3">
                    <h5>Pending Prescriptions</h5>
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>Patient</th><th>Drug</th><th>Dosage</th><th>Action</th></tr></thead>
                        <tbody id="rxBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-3">
                    <h5>Inventory</h5>
                    <ul class="list-group" id="inventoryList"></ul>
                </div>
                <div class="card p-3 mt-2">
                    <h5>Dispense</h5>
                    <input type="text" id="rxId" class="form-control mb-2" placeholder="Prescription ID">
                    <input type="text" id="drugCode" class="form-control mb-2" placeholder="Drug Code">
                    <input type="number" id="quantity" class="form-control mb-2" value="1">
                    <button class="btn btn-success w-100" onclick="dispense()">Dispense</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function load() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = `Pharmacist: ${me.user.full_name}`;
            
            const rx = await api.get('/pharmacy/prescriptions?status=pending');
            document.getElementById('rxBody').innerHTML = rx.prescriptions.map(p => `
                <tr><td>${p.id}</td><td>${p.patient_id}</td><td>${p.drug_code}</td><td>${p.dosage}</td>
                <td><button class="btn btn-sm btn-outline-success" onclick="fillRx(${p.id},'${p.drug_code}')">Dispense</button></td></tr>
            `).join('');

            const inv = await api.get('/pharmacy/inventory');
            document.getElementById('inventoryList').innerHTML = inv.inventory.map(i => `
                <li class="list-group-item d-flex justify-content-between">${i.name} (${i.drug_code}) <span class="badge bg-${i.stock < 50 ? 'warning' : 'success'}">${i.stock}</span></li>
            `).join('');
        }

        function fillRx(id, drug) {
            document.getElementById('rxId').value = id;
            document.getElementById('drugCode').value = drug;
        }

        async function dispense() {
            const rxId = document.getElementById('rxId').value;
            const drugCode = document.getElementById('drugCode').value;
            const qty = parseInt(document.getElementById('quantity').value);

            if (!drugCode || !rxId) {
                alert('Please select a prescription first.');
                return;
            }

            try {
                const res = await api.post('/pharmacy/dispense', { drug_code: drugCode, quantity: qty });
                if (res.success) {
                    // استخدم المعرف الرقمي للوصفة
                    await api.put(`/pharmacy/prescriptions/${rxId}/status`, { status: 'dispensed' });
                    alert(res.message);
                    location.reload();
                } else {
                    alert(res.message);
                }
            } catch (e) {
                alert('Error: ' + (e.message || 'Could not dispense'));
            }
        }

        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        load();
    </script>
</body>
</html>
