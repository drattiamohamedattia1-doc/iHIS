<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f6fa; }
        .navbar-custom { background: linear-gradient(135deg, #198754, #20c997); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-prescription-bottle-alt"></i> iHIS Pharmacy</a>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Pending Prescriptions</div>
                    <ul class="list-group list-group-flush" id="rxList"></ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Dispense Medication</div>
                    <div class="card-body">
                        <form onsubmit="dispense(event)">
                            <input type="text" id="drugCode" class="form-control mb-2" placeholder="Drug Code" required>
                            <input type="number" id="quantity" class="form-control mb-2" value="1" required>
                            <button class="btn btn-success w-100">Dispense</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function loadDashboard() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = `Pharm: ${me.user.full_name}`;
            const rx = await api.get('/pharmacy/prescriptions?status=pending');
            document.getElementById('rxList').innerHTML = rx.prescriptions.map(p =>
                `<li class="list-group-item">#${p.id} - Patient: ${p.patient_id} - ${p.drug_code} (${p.dosage})</li>`
            ).join('');
        }
        async function dispense(e) {
            e.preventDefault();
            const data = { drug_code: document.getElementById('drugCode').value, quantity: parseInt(document.getElementById('quantity').value) };
            try {
                const res = await api.post('/pharmacy/dispense', data);
                alert(res.message);
                loadDashboard();
            } catch (err) { alert(err.message); }
        }
        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        loadDashboard();
    </script>
</body>
</html>
