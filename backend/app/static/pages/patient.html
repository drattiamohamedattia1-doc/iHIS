<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f4f6f9; }
        .navbar-custom { background: linear-gradient(135deg, #0d6efd, #6610f2); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom p-2">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-procedures"></i> iHIS Patient</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>Upcoming Appointments</h5>
                    <div id="appointmentsList"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>Lab Results</h5>
                    <canvas id="labChart" height="100"></canvas>
                    <div id="labResults" class="mt-2"></div>
                </div>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#bookModal">Book Appointment</button>
            </div>
        </div>
    </div>

    <!-- Book Appointment Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5>Book Appointment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="doctorSelect" class="form-select mb-2"></select>
                    <input type="date" id="apptDate" class="form-control mb-2">
                    <input type="time" id="apptTime" class="form-control mb-2">
                    <input type="text" id="apptReason" class="form-control mb-2" placeholder="Reason">
                    <button class="btn btn-primary" onclick="bookAppointment()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let patientId = null;

        async function loadDashboard() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = me.user.full_name;
            patientId = me.user.patient_id;
            loadAppointments();
            loadLabResults();
            loadDoctors();
        }

        async function loadAppointments() {
            const res = await api.get(`/appointments?patient_id=${patientId}`);
            const html = res.appointments.map(a => `<p>${a.date} ${a.time} - ${a.type} (${a.status})</p>`).join('');
            document.getElementById('appointmentsList').innerHTML = html || 'No appointments';
        }

        async function loadLabResults() {
            const res = await api.get(`/laboratory/results/${patientId}`);
            const results = res.results;
            document.getElementById('labResults').innerHTML = results.map(r => `<p>${r.test_code}: ${r.value} (${r.is_abnormal ? 'Abnormal' : 'Normal'})</p>`).join('');
            const ctx = document.getElementById('labChart').getContext('2d');
            if (results.length > 0) {
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: results.map(r => r.test_code),
                        datasets: [{
                            label: 'Value',
                            data: results.map(r => parseFloat(r.value) || 0),
                            backgroundColor: '#0d6efd'
                        }]
                    }
                });
            }
        }

        async function loadDoctors() {
            const res = await api.get('/doctors');
            const sel = document.getElementById('doctorSelect');
            sel.innerHTML = res.doctors.map(d => `<option value="${d.id}">${d.name} (${d.specialty})</option>`).join('');
        }

        async function bookAppointment() {
            const doctorId = document.getElementById('doctorSelect').value;
            const apptDate = document.getElementById('apptDate').value;
            const apptTime = document.getElementById('apptTime').value;
            const reason = document.getElementById('apptReason').value;

            if (!patientId) {
                alert('Patient ID is missing. Please reload the page.');
                return;
            }
            if (!doctorId || !apptDate || !apptTime) {
                alert('Please fill in all required fields.');
                return;
            }

            const data = {
                patient_id: patientId,
                doctor_id: parseInt(doctorId),
                date: apptDate,
                time: apptTime,
                type: 'regular',
                reason: reason
            };
            try {
                await api.post('/appointments', data);
                alert('Appointment booked!');
                bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
                loadAppointments();
            } catch (e) {
                alert('Failed to book appointment: ' + (e.message || 'Unknown error'));
            }
        }

        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        loadDashboard();
    </script>
</body>
</html>
