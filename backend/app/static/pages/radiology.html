<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radiology Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-custom { background: linear-gradient(135deg, #6f42c1, #d63384); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom p-2">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-x-ray"></i> iHIS Radiology</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-7">
                <div class="card p-3">
                    <h5>Pending Orders</h5>
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>Patient</th><th>Modality</th><th>Body Part</th><th>Action</th></tr></thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-3" id="reportCard" style="display:none;">
                    <h5>Write Report #<span id="currentOrder"></span></h5>
                    <textarea id="findings" class="form-control mb-2" placeholder="Findings"></textarea>
                    <textarea id="impression" class="form-control mb-2" placeholder="Impression"></textarea>
                    <textarea id="conclusion" class="form-control mb-2" placeholder="Conclusion"></textarea>
                    <div class="form-check mb-2"><input type="checkbox" id="isCritical" class="form-check-input"><label>Critical Finding</label></div>
                    <button class="btn btn-primary" onclick="submitReport()">Submit Report</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        let selectedOrderId = null;

        async function load() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = `Radiologist: ${me.user.full_name}`;
            const res = await api.get('/radiology/orders');
            const pending = res.orders.filter(o => o.status !== 'reported');
            document.getElementById('ordersBody').innerHTML = pending.map(o => `
                <tr><td>${o.id}</td><td>${o.patient_id}</td><td>${o.modality}</td><td>${o.body_part || '-'}</td>
                <td><button class="btn btn-sm btn-outline-primary" onclick="selectOrder(${o.id})">Report</button></td></tr>
            `).join('');
        }

        function selectOrder(id) {
            selectedOrderId = id;
            document.getElementById('currentOrder').textContent = id;
            document.getElementById('reportCard').style.display = 'block';
        }

        async function submitReport() {
            const data = {
                order_id: selectedOrderId,
                findings: document.getElementById('findings').value,
                impression: document.getElementById('impression').value,
                conclusion: document.getElementById('conclusion').value,
                is_critical: document.getElementById('isCritical').checked
            };
            await api.post('/radiology/reports', data);
            await api.put(`/radiology/orders/${selectedOrderId}/status`, { status: 'reported' });
            alert('Report submitted');
            location.reload();
        }

        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        load();
    </script>
</body>
</html>
