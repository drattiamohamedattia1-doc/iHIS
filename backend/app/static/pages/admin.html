<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> body { background: #f4f6f9; } .card { border-radius: 15px; } </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark p-2"><span class="navbar-brand"><i class="fas fa-shield-alt"></i> Admin</span> <button class="btn btn-outline-light" onclick="logout()">Logout</button></nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4"><div class="card p-3 text-center"><h3 id="usersCount">-</h3>Users</div></div>
            <div class="col-md-4"><div class="card p-3 text-center"><h3 id="rolesCount">-</h3>Roles</div></div>
            <div class="col-md-4"><div class="card p-3 text-center"><h3 id="tablesCount">-</h3>Tables</div></div>
        </div>
        <div class="row mt-4">
            <div class="col-md-6"><canvas id="usersChart"></canvas></div>
            <div class="col-md-6"><div id="tableList"></div></div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function load() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const resp = await fetch('/api/health');
            const health = await resp.json();
            document.getElementById('usersCount').textContent = health.counts.users;
            document.getElementById('rolesCount').textContent = health.counts.roles;
            document.getElementById('tablesCount').textContent = health.database.tables_count;
            document.getElementById('tableList').innerHTML = '<h5>Tables</h5><ul>' + health.database.tables.map(t => `<li>${t}</li>`).join('') + '</ul>';
            new Chart(document.getElementById('usersChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Users', 'Roles', 'Permissions'],
                    datasets: [{
                        data: [health.counts.users, health.counts.roles, health.counts.permissions],
                        backgroundColor: ['#0d6efd','#198754','#ffc107']
                    }]
                }
            });
        }
        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        load();
    </script>
</body>
</html>
