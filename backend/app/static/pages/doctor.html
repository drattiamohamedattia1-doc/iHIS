<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: linear-gradient(135deg, #0d6efd, #6610f2); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .stat-icon { font-size: 2.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom p-2">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-user-md"></i> iHIS Doctor</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- left sidebar: search & patient info -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h5><i class="fas fa-search me-2"></i>Find Patient</h5>
                    <input type="text" id="patientSearch" class="form-control mb-2" placeholder="Name or MRN">
                    <button class="btn btn-outline-primary btn-sm" onclick="searchPatient()">Search</button>
                    <div id="patientResult" class="mt-2"></div>
                    <div id="patientDetail" class="mt-3 d-none">
                        <hr>
                        <h6 id="ptName"></h6>
                        <p>MRN: <span id="ptMRN"></span> | Age: <span id="ptAge"></span></p>
                        <button class="btn btn-sm btn-success" onclick="showVitals()">Vitals</button>
                        <button class="btn btn-sm btn-warning" onclick="showPrescriptionForm()">New Prescription</button>
                        <button class="btn btn-sm btn-info" onclick="showLabOrderForm()">Lab Order</button>
                        <button class="btn btn-sm btn-secondary" onclick="showRadOrderForm()">Radiology Order</button>
                    </div>
                </div>
                <div class="card p-3" id="vitalsCard" style="display:none;">
                    <h5>Latest Vitals</h5>
                    <div id="vitalsData"></div>
                </div>
            </div>

            <!-- right: appointments & quick actions -->
            <div class="col-md-8">
                <div class="card p-3">
                    <h5><i class="fas fa-calendar-alt me-2"></i>My Appointments</h5>
                    <div id="appointmentsList" class="list-group"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for forms -->
    <div class="modal fade" id="formModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
        let currentDoctor = null;
        let selectedPatient = null;

        async function loadDashboard() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            try {
                const me = await api.get('/auth/me');
                document.getElementById('userName').textContent = `Dr. ${me.user.full_name}`;
                currentDoctor = me.user.doctor_id;
                if (!currentDoctor) { alert('Doctor profile missing'); return; }
                const appts = await api.get(`/appointments?doctor_id=${currentDoctor}`);
                renderAppointments(appts.appointments);
            } catch (e) { alert('Session expired'); window.location.href = '/static/pages/login.html'; }
        }

        function renderAppointments(list) {
            const html = list.map(a => `<div class="list-group-item">
                <strong>${a.date}</strong> ${a.time} - Patient #${a.patient_id} (${a.status})
            </div>`).join('');
            document.getElementById('appointmentsList').innerHTML = html || '<p>No appointments</p>';
        }

        async function searchPatient() {
            const query = document.getElementById('patientSearch').value.trim();
            if (!query) return;
            // Use patients endpoint with query parameter (add ?q= on backend)
            const res = await api.get(`/patients?q=${encodeURIComponent(query)}`);
            if (res.patients && res.patients.length > 0) {
                selectedPatient = res.patients[0];
                document.getElementById('patientResult').innerHTML = `<span class="text-success">Found: ${selectedPatient.user_name || 'Patient'} (MRN: ${selectedPatient.patient_id})</span>`;
                document.getElementById('patientDetail').classList.remove('d-none');
                document.getElementById('ptName').textContent = selectedPatient.user_name || 'Patient';
                document.getElementById('ptMRN').textContent = selectedPatient.patient_id;
                document.getElementById('ptAge').textContent = selectedPatient.age || '?';
            } else {
                document.getElementById('patientResult').innerHTML = '<span class="text-danger">Not found</span>';
                document.getElementById('patientDetail').classList.add('d-none');
            }
        }

        // Modal functions
        function showPrescriptionForm() {
            document.getElementById('modalTitle').innerHTML = 'New Prescription';
            document.getElementById('modalBody').innerHTML = `
                <input type="text" id="drugCode" class="form-control mb-2" placeholder="Drug Code (e.g., PARA500)">
                <input type="text" id="dosage" class="form-control mb-2" placeholder="Dosage">
                <input type="text" id="frequency" class="form-control mb-2" placeholder="Frequency">
                <input type="text" id="duration" class="form-control mb-2" placeholder="Duration (e.g., 7 days)">
                <button class="btn btn-primary" onclick="submitPrescription()">Save</button>
            `;
            new bootstrap.Modal(document.getElementById('formModal')).show();
        }

        async function submitPrescription() {
            const data = {
                patient_id: selectedPatient.id,
                doctor_id: currentDoctor,
                drug_code: document.getElementById('drugCode').value,
                dosage: document.getElementById('dosage').value,
                frequency: document.getElementById('frequency').value,
                duration: document.getElementById('duration').value
            };
            await api.post('/pharmacy/prescriptions', data);
            alert('Prescription sent!');
            bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
        }

        function showLabOrderForm() {
            document.getElementById('modalTitle').innerHTML = 'New Lab Order';
            document.getElementById('modalBody').innerHTML = `
                <select id="testCode" class="form-select mb-2">
                    <option value="CBC">CBC</option><option value="HbA1c">HbA1c</option><option value="Lipid Profile">Lipid Profile</option>
                </select>
                <button class="btn btn-primary" onclick="submitLabOrder()">Order</button>
            `;
            new bootstrap.Modal(document.getElementById('formModal')).show();
        }

        async function submitLabOrder() {
            await api.post('/laboratory/orders', {
                patient_id: selectedPatient.id,
                doctor_id: currentDoctor,
                test_code: document.getElementById('testCode').value
            });
            alert('Lab order created!');
            bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
        }

        function showRadOrderForm() {
            document.getElementById('modalTitle').innerHTML = 'Radiology Request';
            document.getElementById('modalBody').innerHTML = `
                <select id="modality" class="form-select mb-2">
                    <option value="XRAY">X-Ray</option><option value="CT">CT</option><option value="MRI">MRI</option>
                </select>
                <input type="text" id="bodyPart" class="form-control mb-2" placeholder="Body Part">
                <button class="btn btn-primary" onclick="submitRadOrder()">Request</button>
            `;
            new bootstrap.Modal(document.getElementById('formModal')).show();
        }

        async function submitRadOrder() {
            await api.post('/radiology/orders', {
                patient_id: selectedPatient.id,
                doctor_id: currentDoctor,
                modality: document.getElementById('modality').value,
                body_part: document.getElementById('bodyPart').value
            });
            alert('Radiology order placed!');
            bootstrap.Modal.getInstance(document.getElementById('formModal')).hide();
        }

        async function showVitals() {
            if (!selectedPatient) return;
            try {
                const vitals = await api.get(`/patients/${selectedPatient.id}/vitals`);
                const v = vitals.vitals && vitals.vitals[0];
                document.getElementById('vitalsCard').style.display = 'block';
                document.getElementById('vitalsData').innerHTML = v ?
                    `<p>Temp: ${v.temperature}°C | HR: ${v.heart_rate} | BP: ${v.bp} | SpO2: ${v.spo2}%</p>` :
                    '<p>No vitals recorded.</p>';
            } catch (e) { alert('Could not load vitals'); }
        }

        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        loadDashboard();
    </script>
</body>
</html>
