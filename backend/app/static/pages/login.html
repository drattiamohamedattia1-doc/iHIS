<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHIS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-hospital-alt fa-3x text-primary"></i>
            <h3 class="mt-3">iHIS Login</h3>
            <p class="text-muted">Access your workspace</p>
        </div>
        <div id="error" class="alert alert-danger d-none"></div>
        <form onsubmit="login(event)">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Demo: admin / Admin@123</small>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        document.getElementById('error').classList.add('d-none');
        async function login(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            errorDiv.classList.add('d-none');
            try {
                const res = await api.post('/auth/login', { username, password });
                api.setToken(res.access_token);
                // تم التعديل هنا: توجيه جميع الأدوار إلى dashboard.html
                window.location.href = '/static/pages/dashboard.html';
            } catch (err) {
                errorDiv.textContent = err.message || 'Login failed';
                errorDiv.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
