<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nursing Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; }
        .navbar-custom { background: linear-gradient(135deg, #0dcaf0, #3dd5f3); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom p-2">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-user-nurse"></i> iHIS Nursing</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>My Tasks</h5>
                    <ul class="list-group" id="tasksList"></ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h5>Record Vitals</h5>
                    <input type="number" id="patientId" class="form-control mb-2" placeholder="Patient ID">
                    <div class="row">
                        <div class="col-6"><input type="text" id="temp" class="form-control mb-2" placeholder="Temp (°C)"></div>
                        <div class="col-6"><input type="text" id="hr" class="form-control mb-2" placeholder="Heart Rate"></div>
                    </div>
                    <div class="row">
                        <div class="col-6"><input type="text" id="bpS" class="form-control mb-2" placeholder="Systolic"></div>
                        <div class="col-6"><input type="text" id="bpD" class="form-control mb-2" placeholder="Diastolic"></div>
                    </div>
                    <input type="text" id="spo2" class="form-control mb-2" placeholder="SpO2 (%)">
                    <button class="btn btn-primary w-100" onclick="recordVitals()">Save Vitals</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function load() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = `Nurse: ${me.user.full_name}`;
            const tasks = await api.get('/nursing/tasks');
            document.getElementById('tasksList').innerHTML = tasks.tasks.map(t =>
                `<li class="list-group-item d-flex justify-content-between">${t.task} (Patient ${t.patient_id}) <span class="badge bg-${t.status === 'pending' ? 'warning' : 'success'}">${t.status}</span></li>`
            ).join('');
        }

        async function recordVitals() {
            const patientId = document.getElementById('patientId').value;
            const data = {
                patient_id: parseInt(patientId),
                temperature: document.getElementById('temp').value,
                heart_rate: document.getElementById('hr').value,
                bp_systolic: document.getElementById('bpS').value,
                bp_diastolic: document.getElementById('bpD').value,
                spo2: document.getElementById('spo2').value
            };
            await api.post(`/patients/${patientId}/vitals`, data);
            alert('Vitals recorded!');
        }

        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        load();
    </script>
</body>
</html>
