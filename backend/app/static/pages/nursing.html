<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Dashboard - iHIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f6fa; }
        .navbar-custom { background: linear-gradient(135deg, #0dcaf0, #3dd5f3); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fas fa-user-nurse"></i> iHIS Nursing</a>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">My Tasks</div>
                    <ul class="list-group list-group-flush" id="tasksList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        async function loadDashboard() {
            if (!api.getToken()) { window.location.href = '/static/pages/login.html'; return; }
            const me = await api.get('/auth/me');
            document.getElementById('userName').textContent = `Nurse: ${me.user.full_name}`;
            const tasks = await api.get('/nursing/tasks');
            document.getElementById('tasksList').innerHTML = tasks.tasks.map(t =>
                `<li class="list-group-item">${t.task} - Patient ${t.patient_id} (${t.status})</li>`
            ).join('');
        }
        function logout() { api.clearToken(); window.location.href = '/static/pages/login.html'; }
        loadDashboard();
    </script>
</body>
</html>
